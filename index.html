<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="description" content="철광석에서 용강 생물까지 이어지는 제철 밸류체인 머지 게임">
<title>용강 만들기</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main id="app-shell">
  <section id="game-container" aria-label="용강 만들기 게임">
    <header id="header">
      <div id="score-box" class="hud-card">
        <span class="label">SCORE</span>
        <span id="score">0</span>
      </div>
      <div id="title-box">
        <p class="eyebrow">STEEL VALUE CHAIN MERGE</p>
        <h1>용강 만들기</h1>
      </div>
      <div id="next-box" class="hud-card">
        <span class="label">NEXT</span>
        <span id="next-preview"></span>
      </div>
    </header>

    <div id="canvas-wrap">
      <canvas id="game-canvas" width="420" height="640"></canvas>
      <div id="recipe-quiz-overlay" class="hidden" aria-live="assertive">
        <form id="recipe-quiz-card" autocomplete="off">
          <p class="label">HYUNDAI STEEL RECIPE</p>
          <h2>제철레시피 입력퀴즈</h2>
          <p id="recipe-quiz-prompt"></p>
          <label for="recipe-quiz-input">빈칸 입력</label>
          <input id="recipe-quiz-input" type="text" inputmode="text" aria-describedby="recipe-quiz-help recipe-quiz-status">
          <div id="recipe-quiz-meta">
            <span id="recipe-quiz-help">제한시간: 1글자당 3초</span>
            <strong id="recipe-quiz-countdown">0.0초</strong>
          </div>
          <div id="recipe-quiz-timer"><span></span></div>
          <p id="recipe-quiz-status" class="small">오답 또는 시간초과 시 GAME OVER DEAD</p>
          <button type="submit">제출</button>
        </form>
      </div>
      <div id="game-over-overlay" class="hidden">
        <div class="game-over-content">
          <h2 id="game-over-title">공정 과밀</h2>
          <p>최종 점수: <span id="final-score">0</span></p>
          <p id="game-over-message" class="small">용강까지 이어지는 흐름을 다시 설계하십시오.</p>
          <button id="restart-btn">다시 시작</button>
        </div>
      </div>
    </div>
  </section>

  <aside id="info-panel" aria-label="제철 밸류체인 정보">
    <section class="panel-card mascot-card">
      <img src="assets/generated/yonggang-mascot.png" alt="최종 목표 캐릭터 용강" id="mascot-img">
      <div>
        <p class="label">FINAL LIFEFORM</p>
        <h2>용강</h2>
      </div>
    </section>
    <section class="panel-card">
      <p class="label">FLOW</p>
      <div id="evolution-chart"></div>
    </section>
    <section class="panel-card sprite-card">
      <p class="label">GPT IMAGE ASSET</p>
      <img src="assets/generated/value-chain-sprites.png" alt="제철 밸류체인 오브젝트 스프라이트 시트">
    </section>
    <section class="panel-card factory-card">
      <p class="label">STEEL MILL BACKDROP</p>
      <img src="assets/generated/factory-background.png" alt="용강이 얼굴 모티프가 반영된 제철소 배경 이미지">
    </section>
    <section class="panel-card db-card">
      <p class="label">DATABASE</p>
      <p id="db-status">Google Sheets 어댑터 대기 중</p>
    </section>
  </aside>
</main>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.20.0/matter.min.js"></script>
<script src="data/game-data.js"></script>
<script src="main.js"></script>
</body>
</html>
